  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0D1208;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 25% 25%, rgba(91,138,110,0.1) 0%, transparent 55%),
        radial-gradient(circle at 75% 75%, rgba(193,127,62,0.06) 0%, transparent 55%);
      pointer-events: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.06)} }

    .phone-wrap { animation: fadeIn 0.4s ease; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(91,138,110,0.25); border-radius: 2px; }
    input::placeholder, textarea::placeholder { color: #C8C5BE; }

</head>

const TrekData = {
  getAll() {
    try {
      const stored = localStorage.getItem('trekdiary_treks');
      if (stored) return JSON.parse(stored);
    } catch(e) {}
    localStorage.setItem('trekdiary_treks', JSON.stringify(SAMPLE_TREKS));
    return SAMPLE_TREKS;
  },
  save(treks) {
    localStorage.setItem('trekdiary_treks', JSON.stringify(treks));
  },
  addTrek(trek) {
    const treks = TrekData.getAll();
    treks.unshift(trek);
    TrekData.save(treks);
    return treks;
  },
  updateTrek(id, updates) {
    const treks = TrekData.getAll();
    const idx = treks.findIndex(t => t.id === id);
    if (idx !== -1) { treks[idx] = { ...treks[idx], ...updates }; TrekData.save(treks); }
    return treks;
  },
  deleteTrek(id) {
    const treks = TrekData.getAll().filter(t => t.id !== id);
    TrekData.save(treks);
    return treks;
  },
  addStop(trekId, dayNum, stop) {
    const treks = TrekData.getAll();
    const trek = treks.find(t => t.id === trekId);
    if (trek) {
      const day = trek.days.find(d => d.dayNum === dayNum);
      if (day) { day.stops.push(stop); TrekData.save(treks); }
    }
    return treks;
  },
  updateStop(trekId, dayNum, stopId, updates) {
    const treks = TrekData.getAll();
    const trek = treks.find(t => t.id === trekId);
    if (trek) {
      const day = trek.days.find(d => d.dayNum === dayNum);
      if (day) {
        const stopIdx = day.stops.findIndex(s => s.id === stopId);
        if (stopIdx !== -1) { day.stops[stopIdx] = { ...day.stops[stopIdx], ...updates }; TrekData.save(treks); }
      }
    }
    return treks;
  }
};

const DIFFICULTY_OPTIONS = ['Easy','Moderate','Challenging','Expert'];

function getTrekPhoto(trek) {
  const idx = COVER_GRADIENTS.indexOf(trek.coverGradient);
  if (idx >= 0) return NATURE_PHOTOS[idx % NATURE_PHOTOS.length];
  let h = 0; for (const c of (trek.name||'')) h = (h * 31 + c.charCodeAt(0)) & 0xFFFFFFFF;
  return NATURE_PHOTOS[Math.abs(h) % NATURE_PHOTOS.length];
}

    <div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 8 }}>
        {photos.map((p, i) => (
          <div key={i} style={{ aspectRatio: '1', borderRadius: 12, overflow: 'hidden', background: '#F2F0EB' }}>

  );
};

TD.ElevChart = ({ stops }) => {
  if (!stops || stops.length < 2) return null;
  const elevs = stops.map(s => s.elevation);
  const min = Math.min(...elevs), max = Math.max(...elevs);
  const W = 280, H = 60;
  const pts = elevs.map((e, i) => {
    const x = (i / (elevs.length - 1)) * W;
    const y = H - ((e - min) / (max - min || 1)) * (H - 10) - 5;
    return `${x},${y}`;
  }).join(' ');
  const fillPts = `0,${H} ${pts} ${W},${H}`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ overflow: 'visible' }}>
      <defs>
        <linearGradient id="elevGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#5B8A6E" stopOpacity="0.25"/>
          <stop offset="100%" stopColor="#5B8A6E" stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <polygon points={fillPts} fill="url(#elevGrad)"/>
      <polyline points={pts} fill="none" stroke="#5B8A6E" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
};

function CreateTrekScreen({ onBack, onCreated }) {
  const [name, setName] = React.useState('');
  const [region, setRegion] = React.useState('');
  const [desc, setDesc] = React.useState('');
  const [days, setDays] = React.useState(3);
  const [diff, setDiff] = React.useState('Moderate');
  const [gradIdx, setGradIdx] = React.useState(0);
  const [fetching, setFetching] = React.useState(false);
  const [fetched, setFetched] = React.useState(false);
  const [error, setError] = React.useState('');

  const previewPhoto = NATURE_PHOTOS[gradIdx % NATURE_PHOTOS.length];

  const fetchDetails = async () => {
    if (!name.trim()) return;
    setFetching(true); setError(''); setFetched(false);
    try {
      if (!window.claude) throw new Error('Claude not available');
      const res = await window.claude.complete({
        messages:[{ role:'user', content:`You are a trekking guide database. Given the trek name "${name}", return ONLY valid JSON (no markdown):
{"region":"Region, Country","difficulty":"Easy|Moderate|Challenging|Expert","suggestedDays":number,"description":"2-sentence description","stops":[{"day":1,"name":"Stop Name","elevation":1234,"distanceKm":5,"weather":"☀️ Sunny","notes":"Short vivid note"}]}
Include 4-7 realistic stops. If unknown, make sensible suggestions.` }]
      });
      const json = JSON.parse(res.replace(/```json|```/g,'').trim());
      if (json.region) setRegion(json.region);
      if (json.difficulty) setDiff(json.difficulty);
      if (json.suggestedDays) setDays(json.suggestedDays);
      if (json.description) setDesc(json.description);
      if (json.stops) window._fetchedStops = json.stops;
      setFetched(true);
    } catch(e) { setError('AI fetch unavailable — fill in manually below.'); }
    setFetching(false);
  };

  const handleCreate = () => {
    if (!name.trim()) return;
    const dayArr = Array.from({length:days},(_,i) => {
      const fetchedForDay = (window._fetchedStops||[]).filter(s=>s.day===i+1);
      return { dayNum:i+1, title:`Day ${i+1}`, stops: fetchedForDay.map(s=>({ id:generateId(), name:s.name, elevation:s.elevation||0, distance:s.distanceKm||0, weather:s.weather||'☀️ Sunny', mood:'😊 Happy', notes:s.notes||'', photos:[] })) };
    });
    const trek = { id:generateId(), name:name.trim(), region, difficulty:diff, totalDays:days, coverGradient:COVER_GRADIENTS[gradIdx], description:desc, days:dayArr, createdAt:new Date().toISOString().split('T')[0], completed:false };
    TrekData.addTrek(trek);
    window._fetchedStops = null;
    onCreated(TrekData.getAll(), trek);
  };

  return (
    <div style={{ height:'100%', position:'relative', overflow:'hidden', background:'#0D1A0D' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:180, backgroundImage:`url(${previewPhoto})`, backgroundSize:'cover', backgroundPosition:'center' }}>
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(13,26,13,1) 100%)' }}/>
      </div>
      <div style={{ position:'relative', zIndex:1, padding:'18px 20px 0', marginBottom:8 }}>
        <TD.BackBtn onBack={onBack} light/>
        <h2 style={{ fontSize:30, fontWeight:700, color:'#FFF', margin:'8px 0 2px', fontFamily:"'Poppins', sans-serif" }}>New Trek</h2>
        <p style={{ fontSize:12, color:'rgba(255,255,255,0.4)', margin:0, fontWeight:500 }}>Search to auto-fill with AI ✦</p>
      </div>

      <div style={{ position:'absolute', left:0, right:0, bottom:0, top:140, background:LIGHT_BG, borderRadius:'22px 22px 0 0', overflowY:'auto', padding:'20px 18px 100px' }}>
        <div style={{ background:'#FFF', borderRadius:18, padding:'16px', marginBottom:16, boxShadow:'0 2px 14px rgba(0,0,0,0.07)', border:'1.5px solid rgba(91,138,110,0.18)' }}>
          <div style={{ fontSize:10, fontWeight:800, color:'#5B8A6E', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:10 }}>Trek Name · AI Auto-fill</div>
          <div style={{ display:'flex', gap:8 }}>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Roopkund Trek, Everest Base Camp…"
              onKeyDown={e=>e.key==='Enter'&&fetchDetails()}
              style={{ flex:1, background:'#F7F5F0', border:'1.5px solid #E8E5DE', borderRadius:12, color:'#1A1917', padding:'10px 12px', fontSize:14, fontFamily:'inherit', outline:'none', fontWeight:500 }}/>
            <button onClick={fetchDetails} disabled={!name.trim()||fetching}
              style={{ background:name.trim()&&!fetching?'#5B8A6E':'#E8E5DE', border:'none', borderRadius:12, color:name.trim()&&!fetching?'#FFF':'#B0ADA6', padding:'0 14px', fontSize:13, fontWeight:800, cursor:name.trim()&&!fetching?'pointer':'default', whiteSpace:'nowrap', fontFamily:'inherit' }}>
              {fetching?'…':'✦ Fetch'}
            </button>
          </div>
          {fetching && <><TD.Spinner/><div style={{ textAlign:'center', fontSize:12, color:'#B0ADA6', marginTop:2 }}>Fetching trek details…</div></>}
          {fetched && <div style={{ marginTop:8, fontSize:12, color:'#5B8A6E', fontWeight:700 }}>✓ Details loaded — review below</div>}
          {error && <div style={{ marginTop:8, fontSize:12, color:'#C4524A', fontWeight:600 }}>{error}</div>}
        </div>

        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:10, fontWeight:800, color:'#B0ADA6', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:8 }}>Cover Photo</div>
          <div style={{ display:'flex', gap:8 }}>
            {NATURE_PHOTOS.map((p,i) => (
              <div key={i} onClick={()=>setGradIdx(i)}
                style={{ width:44, height:44, borderRadius:12, backgroundImage:`url(${p})`, backgroundSize:'cover', backgroundPosition:'center', cursor:'pointer', border:gradIdx===i?'2.5px solid #5B8A6E':'2.5px solid transparent', flexShrink:0 }}/>
            ))}
          </div>
        </div>

        <TD.Input label="Region" value={region} onChange={setRegion} placeholder="e.g. Uttarakhand, India"/>
        <TD.Input label="Description" value={desc} onChange={setDesc} placeholder="A brief description…" multiline rows={2}/>
        <TD.Select label="Difficulty" value={diff} onChange={setDiff} options={DIFFICULTY_OPTIONS}/>

        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:10, fontWeight:800, color:'#B0ADA6', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:10 }}>Number of Days</div>
          <div style={{ display:'flex', alignItems:'center', gap:14 }}>
            <button onClick={()=>setDays(Math.max(1,days-1))} style={{ width:38,height:38,borderRadius:12,background:'#F7F5F0',border:'1.5px solid #E8E5DE',color:'#1A1917',fontSize:20,cursor:'pointer',fontWeight:700 }}>−</button>
            <div style={{ fontSize:34, fontWeight:700, color:'#5B8A6E', minWidth:44, textAlign:'center', fontFamily:"'Poppins', sans-serif" }}>{days}</div>
            <button onClick={()=>setDays(Math.min(30,days+1))} style={{ width:38,height:38,borderRadius:12,background:'#F7F5F0',border:'1.5px solid #E8E5DE',color:'#1A1917',fontSize:20,cursor:'pointer',fontWeight:700 }}>+</button>
            <div style={{ fontSize:13, color:'#B0ADA6', fontWeight:600 }}>days planned</div>
          </div>
        </div>

        <TD.PrimaryBtn onClick={handleCreate} disabled={!name.trim()}>Start Trek →</TD.PrimaryBtn>
      </div>
    </div>
  );
}

function SummaryScreen({ trek, onBack }) {
  const allStops = trek.days.flatMap(d=>d.stops);
  const totalDist = allStops.reduce((a,s)=>a+s.distance,0);
  const maxElev = allStops.length?Math.max(...allStops.map(s=>s.elevation)):0;
  const daysLogged = trek.days.filter(d=>d.stops.length>0).length;
  const photoCount = allStops.reduce((a,s)=>a+s.photos.length,0);
  const photo = getTrekPhoto(trek);

  return (
    <div style={{ height:'100%', overflow:'hidden', display:'flex', flexDirection:'column', background:'#0D1A0D' }}>
      <div style={{ position:'relative', flexShrink:0, height:150 }}>
        <div style={{ position:'absolute', inset:0, backgroundImage:`url(${photo})`, backgroundSize:'cover', backgroundPosition:'center' }}>
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(13,26,13,0.98) 100%)' }}/>
        </div>
        <div style={{ position:'relative', zIndex:1, padding:'14px 18px' }}>
          <TD.BackBtn onBack={onBack} light/>
          <h2 style={{ fontSize:22, fontWeight:700, color:'#FFF', margin:'8px 0 2px', fontFamily:"'Poppins', sans-serif" }}>{trek.name}</h2>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)', fontWeight:500 }}>Trek Summary</div>
        </div>
      </div>

      <div style={{ flex:1, background:LIGHT_BG, borderRadius:'20px 20px 0 0', overflowY:'auto', padding:'20px 18px 100px' }}>
        <div style={{ background:'#FFF', borderRadius:20, padding:'16px', display:'flex', marginBottom:12, boxShadow:'0 2px 14px rgba(0,0,0,0.06)' }}>
          <TD.Stat label="Distance" value={totalDist.toFixed(1)} sub="km"/>
          <div style={{ width:1, background:'#F0EDE6' }}/>
          <TD.Stat label="Max Elev" value={maxElev.toLocaleString()} sub="m"/>
          <div style={{ width:1, background:'#F0EDE6' }}/>
          <TD.Stat label="Photos" value={photoCount}/>
        </div>
        <div style={{ background:'#FFF', borderRadius:20, padding:'16px', display:'flex', marginBottom:20, boxShadow:'0 2px 14px rgba(0,0,0,0.06)' }}>
          <TD.Stat label="Days" value={`${daysLogged}/${trek.totalDays}`}/>
          <div style={{ width:1, background:'#F0EDE6' }}/>
          <TD.Stat label="Stops" value={allStops.length}/>
          <div style={{ width:1, background:'#F0EDE6' }}/>
          <TD.Stat label="Difficulty" value={trek.difficulty.slice(0,3)}/>
        </div>
        {allStops.length>=2 && (
          <TD.Section title="Elevation Profile">
            <div style={{ background:'#FFF', borderRadius:16, padding:'14px', boxShadow:'0 1px 8px rgba(0,0,0,0.05)' }}>
              <TD.ElevChart stops={allStops}/>
              <div style={{ display:'flex', justifyContent:'space-between', marginTop:6 }}>
                <span style={{ fontSize:10, color:'#B0ADA6', fontWeight:600 }}>{allStops[0]?.name}</span>
                <span style={{ fontSize:10, color:'#B0ADA6', fontWeight:600 }}>{allStops[allStops.length-1]?.name}</span>
              </div>
            </div>
          </TD.Section>
        )}
        <TD.Section title="Day Breakdown">
          {trek.days.map(d => (
            <div key={d.dayNum} style={{ background:'#FFF', borderRadius:14, padding:'12px 14px', marginBottom:8, boxShadow:'0 1px 6px rgba(0,0,0,0.05)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div><span style={{ fontSize:11, fontWeight:800, color:'#5B8A6E', marginRight:8 }}>Day {d.dayNum}</span><span style={{ fontSize:13, color:'#1A1917', fontWeight:600 }}>{d.title}</span></div>
              <TD.Badge small color={d.stops.length?'#4A9B6E':'#B0ADA6'} bg={d.stops.length?'rgba(74,155,110,0.1)':'rgba(176,173,166,0.1)'}>{d.stops.length} stops</TD.Badge>
            </div>
          ))}
        </TD.Section>
        {trek.description && (
          <TD.Section title="About">
            <div style={{ background:'#FFF', borderRadius:16, padding:'14px', boxShadow:'0 1px 6px rgba(0,0,0,0.04)' }}>
              <div style={{ fontSize:14, color:'#7A7570', lineHeight:1.65, fontWeight:500 }}>{trek.description}</div>
            </div>
          </TD.Section>
        )}
      </div>
    </div>
  );
}

function TrekPathScreen({ trek, onBack, onSelectDay }) {
  const photo = getTrekPhoto(trek);
  const daysLogged = trek.days.filter(d => d.stops.length > 0).length;
  const pct = Math.round((daysLogged / trek.totalDays) * 100);

  const COLS = [1, 2, 1, 0, 1, 2, 1, 0, 1, 2, 1, 0, 1, 2, 1, 0, 1, 2, 1, 0, 1, 2, 1, 0, 1, 2, 1, 0, 1, 2];
  const NODE_SIZE = 62;
  const ROW_H = 100;
  const W = 280;
  const colX = [36, W / 2 - NODE_SIZE / 2, W - 36 - NODE_SIZE];

  const getStatus = (dayIdx) => {
    const day = trek.days[dayIdx];
    if (!day) return 'locked';
    if (day.stops.length > 0) return 'done';
    if (dayIdx === daysLogged) return 'current';
    return 'locked';
  };

  const nodeColor = {
    done:    { bg: '#5B8A6E', shadow: 'rgba(91,138,110,0.45)' },
    current: { bg: '#C8A040', shadow: 'rgba(200,160,64,0.45)' },
    locked:  { bg: '#E8E5DE', shadow: 'rgba(0,0,0,0.06)' },
  };

  const buildPath = (fromCol, toCol, rowIdx) => {
    const x1 = colX[fromCol] + NODE_SIZE / 2;
    const y1 = rowIdx * ROW_H + NODE_SIZE;
    const x2 = colX[toCol] + NODE_SIZE / 2;
    const y2 = (rowIdx + 1) * ROW_H;
    return `M ${x1} ${y1} C ${x1} ${y1 + 30}, ${x2} ${y2 - 30}, ${x2} ${y2}`;
  };

  const totalH = trek.totalDays * ROW_H + 40;

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: '#0D1A0D' }}>
      <div style={{ position: 'relative', flexShrink: 0, height: 150 }}>
        <div style={{ position: 'absolute', inset: 0, backgroundImage: `url(${photo})`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
          <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(13,26,13,0.98) 100%)' }}/>
        </div>
        <div style={{ position: 'relative', zIndex: 1, padding: '14px 18px' }}>
          <TD.BackBtn onBack={onBack} light/>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginTop: 8 }}>
            <div>
              <h2 style={{ fontSize: 20, fontWeight: 700, color: '#FFF', margin: '0 0 2px', fontFamily: "'Poppins', sans-serif" }}>{trek.name}</h2>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.45)', fontWeight: 500 }}>{daysLogged} of {trek.totalDays} days completed</div>
            </div>
            <div style={{ position: 'relative', width: 52, height: 52, flexShrink: 0 }}>
              <svg width="52" height="52" viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="22" fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="4"/>
                <circle cx="26" cy="26" r="22" fill="none" stroke="#7EC8A0" strokeWidth="4"
                  strokeDasharray={`${2 * Math.PI * 22}`}
                  strokeDashoffset={`${2 * Math.PI * 22 * (1 - pct / 100)}`}
                  strokeLinecap="round" transform="rotate(-90 26 26)"/>
              </svg>
              <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 800, color: '#FFF' }}>{pct}%</div>
            </div>
          </div>
        </div>
      </div>

      <div style={{ flex: 1, background: '#F5F3EF', borderRadius: '22px 22px 0 0', overflowY: 'auto', position: 'relative' }}>
        <div style={{ position: 'absolute', inset: 0, backgroundImage: 'radial-gradient(circle, #C8C5BE 1px, transparent 1px)', backgroundSize: '22px 22px', opacity: 0.45, pointerEvents: 'none' }}/>

        <div style={{ position: 'relative', padding: '24px 0 40px', display: 'flex', justifyContent: 'center' }}>
          <div style={{ position: 'relative', width: W, height: totalH }}>
            <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', overflow: 'visible' }}>
              {trek.days.map((_, i) => {
                if (i >= trek.totalDays - 1) return null;
                const fromCol = COLS[i % COLS.length];
                const toCol = COLS[(i + 1) % COLS.length];
                const status = getStatus(i);
                const strokeColor = status === 'done' ? '#7EC8A0' : status === 'current' ? '#E8C060' : '#D5D1CA';
                return (
                  <path key={i} d={buildPath(fromCol, toCol, i)}
                    fill="none" stroke={strokeColor} strokeWidth="4"
                    strokeLinecap="round" strokeLinejoin="round"/>
                );
              })}
            </svg>

            {trek.days.map((day, i) => {
              const col = COLS[i % COLS.length];
              const x = colX[col];
              const y = i * ROW_H;
              const status = getStatus(i);
              const nc = nodeColor[status];
              const isClickable = status !== 'locked';

              return (
                <div key={i} onClick={() => isClickable && onSelectDay(day.dayNum)}
                  style={{ position: 'absolute', left: x, top: y, width: NODE_SIZE, height: NODE_SIZE, cursor: isClickable ? 'pointer' : 'default' }}>
                  {status === 'current' && (
                    <div style={{ position: 'absolute', inset: -6, borderRadius: 22, border: '2.5px solid rgba(200,160,64,0.35)', animation: 'pulse 2s infinite' }}/>
                  )}
                  <div style={{
                    width: '100%', height: '100%', borderRadius: 18,
                    background: nc.bg,
                    boxShadow: `0 8px 24px ${nc.shadow}, 0 2px 6px rgba(0,0,0,0.1)`,
                    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2,
                    border: status === 'locked' ? '2px solid #E0DDD8' : 'none',
                    transform: status === 'current' ? 'scale(1.08)' : 'scale(1)',
                    transition: 'transform 0.15s',
                  }}>
                    <div style={{ fontSize: status === 'locked' ? 16 : 20, lineHeight: 1 }}>
                      {status === 'done' ? (
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#FFF" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                      ) : status === 'current' ? (
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#FFF"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                      ) : (
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#B0ADA6" strokeWidth="2.2" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                      )}
                    </div>
                    <div style={{ fontSize: 10, fontWeight: 800, color: status === 'locked' ? '#B0ADA6' : 'rgba(255,255,255,0.85)', letterSpacing: '0.04em' }}>D{i + 1}</div>
                  </div>

                  {status === 'done' && day.stops.length > 0 && (
                    <div style={{ position: 'absolute', top: -6, right: -6, background: '#FFF', borderRadius: 10, padding: '1px 6px', fontSize: 10, fontWeight: 800, color: '#5B8A6E', boxShadow: '0 1px 4px rgba(0,0,0,0.12)' }}>
                      {day.stops.length}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ display: 'flex', justifyContent: 'center', gap: 18, paddingBottom: 20, marginTop: -10 }}>
          {[['#5B8A6E', 'Logged'], ['#C8A040', 'Current'], ['#E8E5DE', 'Upcoming']].map(([color, label]) => (
            <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              <div style={{ width: 10, height: 10, borderRadius: 4, background: color, border: color === '#E8E5DE' ? '1.5px solid #D5D1CA' : 'none' }}/>
              <span style={{ fontSize: 11, color: '#9A9590', fontWeight: 600 }}>{label}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SettingsScreen({ treks, onTrekUpdate }) {
  const [units, setUnits] = React.useState(localStorage.getItem('td_units')||'km');
  const handleUnits = u => { setUnits(u); localStorage.setItem('td_units',u); };
  const exportData = () => {
    const blob = new Blob([JSON.stringify(treks,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download='trek-diary.json'; a.click(); URL.revokeObjectURL(url);
  };
  const clearData = () => { if(!window.confirm('Clear all trek data?')) return; localStorage.removeItem('trekdiary_treks'); onTrekUpdate([]); };

  const Row = ({icon,label,right,onClick,danger}) => (
    <div onClick={onClick} style={{ display:'flex', alignItems:'center', gap:12, padding:'14px', cursor:onClick?'pointer':'default', background:'#FFF', borderRadius:16, marginBottom:8, boxShadow:'0 1px 6px rgba(0,0,0,0.05)' }}>
      <span style={{ fontSize:18 }}>{icon}</span>
      <span style={{ flex:1, fontSize:14, color:danger?'#C4524A':'#1A1917', fontWeight:600 }}>{label}</span>
      {right && <span style={{ fontSize:12, color:'#B0ADA6', fontWeight:600 }}>{right}</span>}
      {onClick && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={danger?'#C4524A':'#D5D1CA'} strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>}
    </div>
  );

  return (
    <div style={{ height:'100%', overflowY:'auto', background:LIGHT_BG, padding:'20px 18px 100px' }}>
      <h2 style={{ fontSize:30, fontWeight:700, color:'#1A1917', margin:'4px 0 22px', fontFamily:"'Poppins', sans-serif" }}>Settings</h2>
      <TD.Section title="Preferences">
        <div style={{ background:'#FFF', borderRadius:16, padding:'14px', boxShadow:'0 1px 6px rgba(0,0,0,0.05)', marginBottom:8 }}>
          <div style={{ fontSize:10, fontWeight:800, color:'#B0ADA6', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:10 }}>Distance Units</div>
          <div style={{ display:'flex', gap:8 }}>
            {['km','miles'].map(u=>(
              <button key={u} onClick={()=>handleUnits(u)} style={{ flex:1, padding:'9px', borderRadius:12, border:'none', fontFamily:'inherit', fontSize:13, fontWeight:800, cursor:'pointer', background:units===u?'#5B8A6E':'#F7F5F0', color:units===u?'#FFF':'#9A9590', boxShadow:units===u?'0 2px 8px rgba(91,138,110,0.3)':'none' }}>{u}</button>
            ))}
          </div>
        </div>
      </TD.Section>
      <TD.Section title="Data">
        <Row icon="📤" label="Export Trek Data" right="JSON" onClick={exportData}/>
        <Row icon="🗑️" label="Clear All Data" onClick={clearData} danger/>
      </TD.Section>
      <TD.Section title="About">
        <div style={{ background:'#FFF', borderRadius:16, padding:'16px', boxShadow:'0 1px 6px rgba(0,0,0,0.05)' }}>
          <div style={{ fontSize:24, fontWeight:700, color:'#1A1917', fontFamily:"'Poppins', sans-serif", marginBottom:6 }}>Trek Diary</div>
          <div style={{ fontSize:13, color:'#9A9590', lineHeight:1.65, fontWeight:500 }}>Your offline trekking companion. All data lives locally on your device — no account, no cloud, no internet needed.</div>
          <div style={{ marginTop:12, display:'flex', alignItems:'center', gap:5 }}>
            <span style={{ width:7,height:7,borderRadius:'50%',background:'#5B8A6E',display:'inline-block' }}/>
            <span style={{ fontSize:11, color:'#5B8A6E', fontWeight:800 }}>Offline Ready</span>
          </div>
        </div>
      </TD.Section>
    </div>
  );
}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) {
    return (
      <button onClick={() => setOpen(true)} style={{
        position: 'fixed', right: 16, bottom: 16, zIndex: 2147483645,
        background: 'rgba(250,249,247,0.9)', backdropFilter: 'blur(12px)',
        border: '0.5px solid rgba(255,255,255,0.6)', borderRadius: 10,
        padding: '6px 12px', fontSize: 12, fontWeight: 600, cursor: 'pointer',
        color: '#29261b', boxShadow: '0 4px 16px rgba(0,0,0,0.12)',
        fontFamily: 'inherit'
      }}>⚙ Tweaks</button>
    );
  }

  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl">
        <span>{label}</span>
        <span className="twk-val">{value}{unit}</span>
      </div>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
        value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// App
// ─────────────────────────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = {
  "accentColor": "#5B8A6E",
  "bgColor": "#F2F0EB",
  "phoneScale": 85
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [treks, setTreks] = React.useState(() => TrekData.getAll());
  const [nav, setNav] = React.useState({ screen: 'home' });
  const [tab, setTab] = React.useState('home');

  const currentTrek = nav.trekId ? treks.find(t => t.id === nav.trekId) : null;
  const go = (screen, extra = {}) => setNav({ screen, ...extra });

  const renderScreen = () => {
    switch (nav.screen) {
      case 'home':
        return <HomeScreen treks={treks}
          onSelectTrek={t => { setTab('home'); go('trek-detail', { trekId: t.id }); }}
          onCreateTrek={() => { setTab('create'); go('create'); }}/>;

      case 'create':
        return <CreateTrekScreen
          onBack={() => { go('home'); setTab('home'); }}
          onCreated={(updatedTreks, trek) => {
            setTreks(updatedTreks);
            go('trek-detail', { trekId: trek.id });
            setTab('home');
          }}/>;

      case 'trek-detail':
        return currentTrek ? <TrekDetailScreen trek={currentTrek}
          onBack={() => go('home')}
          onSelectStop={(stop, dayNum) => go('stop-detail', { trekId: currentTrek.id, dayNum, stopId: stop.id })}
          onAddStop={dayNum => go('add-stop', { trekId: currentTrek.id, dayNum })}
          onViewSummary={() => go('summary', { trekId: currentTrek.id })}
          onViewPath={() => go('trek-path', { trekId: currentTrek.id })}
          onTrekUpdate={updated => setTreks(updated)}/> : null;

      case 'stop-detail': {
        const trek = treks.find(t => t.id === nav.trekId);
        const day = trek?.days.find(d => d.dayNum === nav.dayNum);
        const stop = day?.stops.find(s => s.id === nav.stopId);
        return stop ? <StopDetailScreen stop={stop} trekId={nav.trekId} dayNum={nav.dayNum}
          onBack={() => go('trek-detail', { trekId: nav.trekId })}
          onSave={updated => setTreks(updated)}/> : null;
      }

      case 'add-stop':
        return <AddStopScreen trekId={nav.trekId} dayNum={nav.dayNum}
          onBack={() => go('trek-detail', { trekId: nav.trekId })}
          onAdded={updated => { setTreks(updated); go('trek-detail', { trekId: nav.trekId }); }}/>;

      case 'summary':
        return currentTrek ? <SummaryScreen trek={currentTrek}
          onBack={() => go('trek-detail', { trekId: currentTrek.id })}/> : null;

      case 'trek-path':
        return currentTrek ? <TrekPathScreen trek={currentTrek}
          onBack={() => go('trek-detail', { trekId: currentTrek.id })}
          onSelectDay={dayNum => go('trek-detail', { trekId: currentTrek.id })}/> : null;

      case 'settings':
        return <SettingsScreen treks={treks} onTrekUpdate={updated => setTreks(updated)}/>;

      default:
        return <HomeScreen treks={treks}
          onSelectTrek={t => go('trek-detail', { trekId: t.id })}
          onCreateTrek={() => go('create')}/>;
    }
  };

  const TABS = [
    { id: 'home', label: 'Home', screen: 'home', icon:
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    },
    { id: 'create', label: 'New', screen: 'create', icon:
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    },
    { id: 'settings', label: 'Settings', screen: 'settings', icon:
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    },
  ];

  const phoneContent = (
    <div style={{ width: '100%', height: '100%', background: tweaks.bgColor,
      display: 'flex', flexDirection: 'column', position: 'relative', fontFamily: "'Poppins', sans-serif" }}>

      <div key={nav.screen + (nav.trekId || '') + (nav.stopId || '')} className="screen-slide"
        style={{ flex: 1, overflow: 'hidden', position: 'relative' }}>
        {renderScreen()}
      </div>

      {!['stop-detail','add-stop','trek-path'].includes(nav.screen) && (
        <div style={{ background: 'rgba(242,240,235,0.96)', backdropFilter: 'blur(20px)',
          WebkitBackdropFilter: 'blur(20px)',
          borderTop: '1px solid rgba(0,0,0,0.07)', padding: '8px 0 6px',
          display: 'flex', justifyContent: 'space-around', flexShrink: 0 }}>
          {TABS.map(t => {
            const active = tab === t.id;
            return (
              <button key={t.id} onClick={() => { setTab(t.id); go(t.screen); }}
                style={{ background: 'none', border: 'none', cursor: 'pointer',
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
                  padding: '4px 18px', color: active ? tweaks.accentColor : '#C8C5BE',
                  transition: 'color 0.15s' }}>
                {t.icon}
                <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.02em' }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: '100vw', height: '100vh' }}>
      <div className="phone-wrap" style={{ transform: `scale(${tweaks.phoneScale / 100})`, transformOrigin: 'center center', transition: 'transform 0.3s' }}>
        <IOSDevice statusBarStyle="dark">
          {phoneContent}
        </IOSDevice>
      </div>

      <TweaksPanel>
        <TweakSection label="Colours">
          <TweakColor label="Accent" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)}/>
          <TweakColor label="Background" value={tweaks.bgColor} onChange={v => setTweak('bgColor', v)}/>
        </TweakSection>
        <TweakSection label="Display">
          <TweakSlider label="Phone Scale" value={tweaks.phoneScale} onChange={v => setTweak('phoneScale', v)} min={55} max={100} step={5}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
